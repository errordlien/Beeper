name: Sync with Upstream Packages

on:
  schedule:
    # Check for new upstream package updates every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest upstream package digest
        id: upstream
        run: |
          TOKEN=$(curl -fsSL "https://ghcr.io/token?scope=repository:beeper/bridge-manager:pull" | jq -r .token)
          DIGEST=$(curl -fsSI \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json" \
            "https://ghcr.io/v2/beeper/bridge-manager/manifests/latest" \
            | tr -d '\r' \
            | awk -F': ' '{ if (tolower($1) == "docker-content-digest") print $2 }')

          if [ -z "$DIGEST" ]; then
            echo "Could not resolve upstream package digest" >&2
            exit 1
          fi

          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/beeper/bridge-manager@$DIGEST" >> "$GITHUB_OUTPUT"
          echo "url=https://github.com/beeper/bridge-manager/pkgs/container/bridge-manager" >> "$GITHUB_OUTPUT"

      - name: Check if package digest already synced
        id: check
        run: |
          if grep -q "# Synced with beeper/bridge-manager package digest ${{ steps.upstream.outputs.digest }}" Dockerfile; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Package digest ${{ steps.upstream.outputs.digest }} already synced"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "New package digest detected: ${{ steps.upstream.outputs.digest }}"
          fi

      - name: Configure Git
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create package sync commit
        if: steps.check.outputs.exists == 'false'
        run: |
          # Update Dockerfile comment or add it for tracking
          sed -i "s|# Synced with beeper/bridge-manager.*|# Synced with beeper/bridge-manager package digest ${{ steps.upstream.outputs.digest }}|g" Dockerfile || true

          # If the comment doesn't exist, add it after the git clone line
          if ! grep -q "# Synced with beeper/bridge-manager" Dockerfile; then
            sed -i "/RUN git clone/a # Synced with beeper/bridge-manager package digest ${{ steps.upstream.outputs.digest }}" Dockerfile
          fi

          SHORT_DIGEST=$(echo "${{ steps.upstream.outputs.digest }}" | sed 's/^sha256://' | cut -c1-12)
          git add Dockerfile
          git commit -m "Sync with upstream package $SHORT_DIGEST" || echo "No changes to commit"
          git tag -fa "dev/latest" -m "Dev package sync ${{ steps.upstream.outputs.digest }}"

      - name: Push changes
        if: steps.check.outputs.exists == 'false'
        run: |
          git push origin main
          git push origin "dev/latest" --force

      - name: Create or update GitHub Release (dev/latest)
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << EOF > /tmp/release_notes.md
          # Beeper Bridge Manager Dev Channel

          This dev release tracks the latest upstream package from [beeper/bridge-manager](${{ steps.upstream.outputs.url }}).

          ## Upstream Package

          \`${{ steps.upstream.outputs.image }}\`

          ## Docker Images

          \`\`\`bash
          # GitHub Container Registry
          docker pull ghcr.io/${{ github.repository }}:dev/latest
          docker pull ghcr.io/${{ github.repository }}:prod/main
          docker pull ghcr.io/${{ github.repository }}:latest
          \`\`\`

          ## Verification

          The container is synced to upstream package digest \`${{ steps.upstream.outputs.digest }}\`.
          EOF

          if gh release view "dev/latest" >/dev/null 2>&1; then
            gh release edit "dev/latest" \
              --title "Dev Release (latest upstream package)" \
              --notes-file /tmp/release_notes.md
          else
            gh release create "dev/latest" \
              --title "Dev Release (latest upstream package)" \
              --notes-file /tmp/release_notes.md
          fi

      - name: Trigger Docker build
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run docker-publish.yml --ref "dev/latest"
